name: Odśwież filmy YouTube

on:
  schedule:
    - cron: '0 * * * *'   # co godzinę
  workflow_dispatch:       # możliwość ręcznego uruchomienia z GitHub

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4

      - name: Pobierz RSS i zapisz videos.json
        run: |
          curl -s "https://www.youtube.com/feeds/videos.xml?channel_id=UCQHb6jgWsW0IGBwynQah1vg" \
            -H "User-Agent: Mozilla/5.0" \
            -o feed.xml

          python3 - << 'EOF'
          import xml.etree.ElementTree as ET, json, re

          tree = ET.parse('feed.xml')
          root = tree.getroot()

          NS = {
              'atom': 'http://www.w3.org/2005/Atom',
              'yt':   'http://www.youtube.com/xml/schemas/2015',
              'media':'http://search.yahoo.com/mrss/',
          }

          videos = []
          for entry in root.findall('atom:entry', NS)[:8]:
              vid_id = entry.findtext('yt:videoId', namespaces=NS) or ''
              title  = entry.findtext('atom:title',  namespaces=NS) or ''
              thumb  = f'https://img.youtube.com/vi/{vid_id}/hqdefault.jpg'
              if vid_id:
                  videos.append({
                      'videoId': vid_id,
                      'title':   title,
                      'thumb':   thumb,
                      'url':     f'https://www.youtube.com/watch?v={vid_id}',
                  })

          with open('videos.json', 'w', encoding='utf-8') as f:
              json.dump(videos, f, ensure_ascii=False, indent=2)

          print(f'Zapisano {len(videos)} filmów.')
          EOF

      - name: Zatwierdź zmiany jeśli videos.json się zmieniło
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add videos.json
          git diff --staged --quiet || git commit -m "chore: aktualizacja videos.json [skip ci]"
          git push
